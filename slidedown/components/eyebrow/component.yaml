name: eyebrow
aliases: [kicker, category]
description: A small category pill above the slide title — the section label and optional index.
content: parse
props:
  index:
    type: text
    default: ""
  dot:
    type: flag
  tone:
    type: enum
    values: [accent, ink]
    default: accent
template: |
  <div class="eyebrow tone-{{tone}}">{{#dot}}<span class="eb-dot"></span>{{/dot}}<span class="eb-label">{{{content}}}</span>{{#index}}<span class="eb-sep">·</span><span class="eb-idx">{{index}}</span>{{/index}}</div>
styles: |
  /* When a slide contains an eyebrow, switch its inner column to flex so the eyebrow
     can lift above the title via order:-1 — no DOM reshuffling required, and existing
     slides without an eyebrow keep the default block layout. */
  .slide .inner:has(.eyebrow) { display: flex; flex-direction: column; align-items: stretch; }
  .slide .inner:has(.eyebrow) .s-title { margin-top: 0; }
  .slide .inner > .eyebrow,
  .slide .inner > .sd-box:has(> .eyebrow) { order: -1; align-self: center; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px; border-radius: var(--radius-pill);
    background: var(--color-card); box-shadow: var(--shadow-sm);
    font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: 28px;
  }
  .eyebrow.tone-accent { color: var(--color-accent); }
  .eyebrow.tone-ink { color: var(--color-ink); }
  .eyebrow .eb-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--color-accent); flex: none;
  }
  .eyebrow .eb-sep { opacity: .55; font-weight: 500; }
  .eyebrow .eb-idx { color: var(--color-accent); }
  .eyebrow.tone-ink .eb-idx { color: var(--color-ink); opacity: .65; }
  /* On cover/closing slides the inner already centres text — keep alignment consistent */
  .slide.cover .inner:has(.eyebrow), .slide.closing .inner:has(.eyebrow) { align-items: center; }
