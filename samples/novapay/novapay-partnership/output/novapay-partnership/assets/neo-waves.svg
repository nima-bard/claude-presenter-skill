<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nw-warm" x1="0.15" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#ffd1ab"/>
      <stop offset="0.5" stop-color="#f98cb2"/>
      <stop offset="1" stop-color="#ef5f98"/>
    </linearGradient>
    <linearGradient id="nw-mag" x1="0.1" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#f1619c"/>
      <stop offset="1" stop-color="#c350cf"/>
    </linearGradient>
    <linearGradient id="nw-vio" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#9c58e1"/>
      <stop offset="1" stop-color="#6346d8"/>
    </linearGradient>
    <linearGradient id="nw-ind" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#5e44d4"/>
      <stop offset="1" stop-color="#3d30b6"/>
    </linearGradient>
    <filter id="nw-soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- flowing blob mass bleeding off the right edge + corners; peach→pink→violet→indigo.
       Top-right corner is left clear (the deck's page counter lives there). -->
  <g filter="url(#nw-soft)">
    <path fill="url(#nw-warm)" d="M1760 110 C 1500 120 1300 215 1282 355 C 1266 478 1392 528 1512 506 C 1648 480 1742 392 1800 280 Z"/>
    <path fill="url(#nw-mag)"  d="M1800 370 C 1520 360 1316 460 1320 612 C 1323 728 1470 772 1612 752 C 1740 734 1804 654 1830 548 Z"/>
    <path fill="url(#nw-vio)"  d="M1820 630 C 1540 620 1352 716 1352 846 C 1352 944 1520 998 1706 998 L1860 998 L1860 630 Z"/>
    <path fill="url(#nw-ind)"  d="M1512 812 C 1448 876 1512 982 1676 1004 L1880 1004 L1880 792 C 1744 770 1596 762 1512 812 Z"/>
    <!-- small violet accent bleeding off the bottom-left corner (clear of the top-left brand) -->
    <path fill="url(#nw-vio)"  d="M-90 1010 C 70 924 240 968 282 852 C 320 752 184 710 72 738 C -52 768 -98 866 -130 990 Z"/>
  </g>

  <!-- delicate white "silk" lines + a thin ring, crisp, over the colour -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M1372 150 C 1288 318 1492 420 1412 604 C 1352 742 1512 802 1474 902" stroke-opacity="0.45" stroke-width="2.2"/>
    <path d="M1556 210 C 1486 360 1636 452 1576 632" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="1408" cy="372" r="34" stroke-opacity="0.7" stroke-width="2.6"/>
  </g>
</svg>
